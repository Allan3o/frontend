<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-light shadow-sm">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">Minha Loja</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">
<div class="navbar-nav ms-auto">
<a class="nav-link" href="index.html">Home</a>

<a class="nav-link active" href="contato.html">Contato</a>
</div>
</div>
</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">Fale Conosco</h2>

<div id="area-alerta"></div>

<form id="form-contato">

<div class="mb-3">
<label for="nome" class="form-label">Nome</label>
<input type="text" class="form-control" id="nome" required>
</div>

<div class="mb-3">
<label for="email" class="form-label">E-mail</label>
<input type="email" class="form-control" id="email" required>
</div>

<div class="mb-3">
<label for="mensagem" class="form-label">Mensagem</label>
<textarea class="form-control" id="mensagem" rows="4" required></textarea>
</div>

<button type="submit" class="btn btn-success">
Enviar
</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

const form = document.getElementById("form-contato");

if(!form) return;

form.addEventListener("submit", async function(e){

e.preventDefault();

const nome = document.getElementById("nome").value;
const email = document.getElementById("email").value;
const mensagem = document.getElementById("mensagem").value;

const dados = {
nome: nome,
email: email,
mensagem: mensagem
};

try{

const resposta = await fetch("https://jsonplaceholder.typicode.com/posts",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(dados)

});

if(resposta.status === 201){

mostrarAlerta("Mensagem enviada com sucesso!", "success");

form.reset();

}else{

mostrarAlerta("Erro ao enviar mensagem.", "danger");

}

}catch(erro){

mostrarAlerta("Falha na comunicação com o servidor.", "danger");

}

});

});

function mostrarAlerta(texto,tipo){

const area = document.getElementById("area-alerta");

area.innerHTML = `
<div class="alert alert-${tipo} mt-3">
${texto}
</div>
`;

setTimeout(()=>{
area.innerHTML = "";
},4000);

}

</script>

</body>
</html>
